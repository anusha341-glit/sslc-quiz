<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSLC Kannada Quiz - All Tests</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <div id="menu">
            <h1>SSLC ಕನ್ನಡ ರಸಪ್ರಶ್ನೆ (Quiz)</h1>
            <p>ಯಾವ ಪರೀಕ್ಷೆಯನ್ನು ತೆಗೆದುಕೊಳ್ಳಲು ಬಯಸುತ್ತೀರಿ?</p>
            <div class="menu-grid">
                <button class="btn menu-btn" onclick="loadTest('kannada1.js')">ಪರೀಕ್ಷೆ 1: ಸಾಹಿತ್ಯ (Literature)</button>
                <button class="btn menu-btn" onclick="loadTest('kannada2.js')">ಪರೀಕ್ಷೆ 2: 2021 ಮಾದರಿ ಪತ್ರಿಕೆ</button>
                <button class="btn menu-btn" onclick="loadTest('kannada3.js')">ಪರೀಕ್ಷೆ 3: 2025-26 ಹೊಸ ಮಾದರಿ ಪತ್ರಿಕೆ</button>
            </div>
        </div>

        <div id="quiz-box" class="hide">
            <div class="header">
                <button onclick="location.reload()" class="back-btn">⬅ ಮೆನುಗೆ ಹಿಂತಿರುಗಿ</button>
                <div class="progress-container"><div id="progress-bar"></div></div>
                <div id="timer">ಸಮಯ: 30s</div>
            </div>

            <div id="quiz">
                <h2 id="question">ಪ್ರಶ್ನೆ ಲೋಡ್ ಆಗುತ್ತಿದೆ...</h2>
                <div id="answer-buttons" class="btn-grid"></div>
            </div>

            <div class="controls">
                <button id="next-btn" class="next-btn hide">ಮುಂದಿನ ಪ್ರಶ್ನೆ (Next)</button>
            </div>
        </div>
    </div>

    <script>
        // Logic to load the JS file dynamically
        function loadTest(fileName) {
            // Hide menu, show quiz
            document.getElementById('menu').classList.add('hide');
            document.getElementById('quiz-box').classList.remove('hide');

            // Create a script tag and inject it into the page
            const script = document.createElement('script');
            script.src = fileName;
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
