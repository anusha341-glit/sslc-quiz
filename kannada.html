<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSLC ಕನ್ನಡ ರಸಪ್ರಶ್ನೆ - All Tests</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <div id="menu">
            <h1>SSLC ಕನ್ನಡ ರಸಪ್ರಶ್ನೆ (Quiz)</h1>
            <p>ಅಭ್ಯಾಸಕ್ಕಾಗಿ ಪರೀಕ್ಷೆಯನ್ನು ಆರಿಸಿ:</p>
            <div class="menu-grid">
                <button class="btn menu-btn" onclick="loadTest('kannada1.js')">
                    <strong>ಪರೀಕ್ಷೆ 1</strong>
                </button>

                <button class="btn menu-btn" onclick="loadTest('kannada2.js')" style="background-color: #27ae60;">
                    <strong>ಪರೀಕ್ಷೆ 2</strong>
                </button>

                <button class="btn menu-btn" onclick="loadTest('kannada3.js')" style="background-color: #8e44ad;">
                    <strong>ಪರೀಕ್ಷೆ 3</strong>
                </button>
            </div>
        </div>

        <div id="quiz-box" class="hide">
            <div class="header">
                <button onclick="location.reload()" class="back-btn">⬅ ಮೆನುಗೆ ಹಿಂತಿರುಗಿ</button>
                <div class="progress-container"><div id="progress-bar"></div></div>
                <div id="timer">ಸಮಯ: 30s</div>
            </div>

            <div id="quiz">
                <h1 id="test-title" style="font-size: 1.2rem; color: #7f8c8d; margin-bottom: 10px;">ಕನ್ನಡ ಪರೀಕ್ಷೆ</h1>
                <h2 id="question">ಪ್ರಶ್ನೆ ಲೋಡ್ ಆಗುತ್ತಿದೆ...</h2>
                <div id="answer-buttons" class="btn-grid"></div>
            </div>

            <div class="controls">
                <button id="next-btn" class="next-btn hide">ಮುಂದಿನ ಪ್ರಶ್ನೆ (Next)</button>
            </div>
        </div>
    </div>

    <script>
        function loadTest(fileName) {
            // ಮೆನು ಮರೆಮಾಡಿ, ಕ್ವಿಜ್ ಬಾಕ್ಸ್ ತೋರಿಸಿ
            document.getElementById('menu').classList.add('hide');
            document.getElementById('quiz-box').classList.remove('hide');

            // ಶೀರ್ಷಿಕೆ ನವೀಕರಣ
            const title = document.getElementById('test-title');
            if(fileName === 'kannada1.js') title.innerText = "ಪರೀಕ್ಷೆ 1";
            if(fileName === 'kannada2.js') title.innerText = "ಪರೀಕ್ಷೆ 2";
            if(fileName === 'kannada3.js') title.innerText = "ಪರೀಕ್ಷೆ 3";

            // ಹಳೆಯ ಸ್ಕ್ರಿಪ್ಟ್ ತೆಗೆದುಹಾಕಿ
            const oldScript = document.getElementById('dynamic-test-script');
            if (oldScript) oldScript.remove();

            // ಹೊಸ ಸ್ಕ್ರಿಪ್ಟ್ ಲೋಡ್ ಮಾಡಿ
            const script = document.createElement('script');
            script.src = fileName;
            script.id = 'dynamic-test-script';
            
            script.onerror = function() {
                alert("ದೋಷ: " + fileName + " ಫೈಲ್ ಸಿಗುತ್ತಿಲ್ಲ!");
            };

            document.body.appendChild(script);
        }
    </script>
</body>
</html>
